services:
  calcom-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=calcom
      - POSTGRES_PASSWORD=calcom
      - POSTGRES_DB=calcom
    volumes:
      - calcom_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calcom"]
      interval: 5s
      timeout: 5s
      retries: 10

  calcom-migrate:
    image: calcom/cal.com:latest
    environment:
      - DATABASE_URL=postgresql://calcom:calcom@calcom-db:5432/calcom
      - DATABASE_DIRECT_URL=postgresql://calcom:calcom@calcom-db:5432/calcom
      - NEXTAUTH_SECRET=supersecretkey-change-in-prod
      - NEXTAUTH_URL=http://localhost:3000
      - NEXT_PUBLIC_WEBAPP_URL=http://localhost:3000
    command: sh -c "npx prisma migrate deploy"
    depends_on:
      calcom-db:
        condition: service_healthy
    restart: "no"

  calcom:
    image: calcom/cal.com:latest
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://calcom:calcom@calcom-db:5432/calcom
      - DATABASE_DIRECT_URL=postgresql://calcom:calcom@calcom-db:5432/calcom
      - NEXTAUTH_SECRET=supersecretkey-change-in-prod
      - NEXTAUTH_URL=http://localhost:3000
      - NEXT_PUBLIC_WEBAPP_URL=http://localhost:3000
      - CALCOM_LICENSE_KEY=
      - CALENDSO_ENCRYPTION_KEY=BV0kDyFmwzWciSldLuOs9vZIA2N7eto5
    depends_on:
      calcom-db:
        condition: service_healthy
      calcom-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  calcom_db_data:
